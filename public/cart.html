<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>カート - YOICHI STORE</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    .cart-wrap { max-width: 720px; margin: 60px auto; padding: 0 18px; }
    .cart-wrap h2 { font-size: 1.6rem; font-weight: 800; margin-bottom: 24px;
      background: linear-gradient(90deg, #7dd3fc 0%, #a78bfa 40%, #ff9a9e 70%, #ffd166 100%);
      -webkit-background-clip: text; background-clip: text;
      color: transparent; -webkit-text-fill-color: transparent; }
    .cart-list { background: #fff; border-radius: 12px; box-shadow: 0 12px 36px rgba(16,24,40,0.06); overflow: hidden; }
    .cart-item { display: flex; align-items: center; gap: 16px; padding: 16px 20px; border-bottom: 1px solid #f0f0f0; }
    .cart-item:last-child { border-bottom: none; }
    .cart-item img { width: 72px; height: 72px; object-fit: cover; border-radius: 10px; background: #f3f4f6; }
    .cart-item-info { flex: 1; }
    .cart-item-title { font-weight: 700; font-size: 1rem; margin-bottom: 4px; }
    .cart-item-price { color: #ef4444; font-weight: 800; }
    .cart-item-qty { display: flex; align-items: center; gap: 8px; }
    .qty-btn { width: 30px; height: 30px; border-radius: 50%; border: 1px solid #e5e7eb;
      background: #f9fafb; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .qty-btn:hover { background: #f3f4f6; }
    .qty-num { font-weight: 700; min-width: 24px; text-align: center; font-size: 1rem; }
    .del-btn { background: none; border: none; cursor: pointer; color: #9ca3af; font-size: 1.2rem; padding: 4px 8px; }
    .del-btn:hover { color: #ef4444; }
    .cart-footer { background: #fff; border-radius: 12px; box-shadow: 0 12px 36px rgba(16,24,40,0.06);
      margin-top: 16px; padding: 20px 24px; }
    .cart-total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .cart-total { font-size: 1.2rem; font-weight: 800; }
    .cart-total span { color: #ef4444; margin-left: 8px; }
    .checkout-btn { display: block; width: 100%; padding: 15px; text-align: center;
      background: #111827; color: #fff; border: none; border-radius: 12px;
      font-size: 1rem; font-weight: 700; font-family: inherit; cursor: pointer; text-decoration: none;
      transition: background 150ms; }
    .checkout-btn:hover { background: #374151; }
    .empty-msg { text-align: center; padding: 60px 0; color: #9ca3af; font-size: 1rem; }
    .back-link { display: inline-block; margin-bottom: 20px; color: #6b7280; text-decoration: none; font-size: 0.9rem; }
    .back-link:hover { color: #111; }
  </style>
</head>
<body>
  <div class="cart-wrap">
    <a href="index.html" class="back-link">← ショップに戻る</a>
    <h2>カート</h2>

    <div class="cart-list" id="cart-list">
      <div class="empty-msg">カートに商品がありません</div>
    </div>

    <div class="cart-footer" id="cart-footer" style="display:none">
      <div class="cart-total-row">
        <div class="cart-total">合計<span id="total-price">¥0</span></div>
      </div>
      <a href="checkout.html" class="checkout-btn">購入手続きへ →</a>
    </div>
  </div>

  <script>
    const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:4000' : '';

    function getCart() {
      try {
        const raw = JSON.parse(localStorage.getItem('yoichi_cart') || '[]');
        const map = {};
        raw.forEach(item => {
          const id = String(item.id);
          const qty = parseInt(item.qty, 10);
          if (!id || isNaN(qty) || qty <= 0) return;
          if (map[id]) map[id].qty += qty;
          else map[id] = { id, qty };
        });
        return Object.values(map);
      } catch { return []; }
    }

    function saveCart(cart) {
      localStorage.setItem('yoichi_cart', JSON.stringify(cart));
    }

    async function renderCart() {
      let cart = getCart();
      const listEl = document.getElementById('cart-list');
      const footer = document.getElementById('cart-footer');

      if (cart.length === 0) {
        listEl.innerHTML = '<div class="empty-msg">カートに商品がありません</div>';
        footer.style.display = 'none';
        return;
      }

      let products = [];
      try {
        const res = await fetch(API_BASE + '/api/products');
        products = await res.json();
      } catch(e) { console.error(e); }

      let total = 0;
      const items = cart.map(item => {
        const p = products.find(x => String(x.id) === String(item.id));
        if (!p) return '';
        const qty = parseInt(item.qty, 10) || 1;
        const price = parseInt(p.price, 10) || 0;
        total += price * qty;
        const imgSrc = API_BASE + '/uploads/' + (p.image || 'placeholder.png');
        return `
          <div class="cart-item" data-id="${p.id}">
            <img src="${imgSrc}" alt="${p.title}">
            <div class="cart-item-info">
              <div class="cart-item-title">${p.title}</div>
              <div class="cart-item-price">¥${price.toLocaleString()}</div>
            </div>
            <div class="cart-item-qty">
              <button class="qty-btn" onclick="changeQty('${p.id}', -1)">－</button>
              <span class="qty-num">${qty}</span>
              <button class="qty-btn" onclick="changeQty('${p.id}', 1)">＋</button>
            </div>
            <button class="del-btn" onclick="removeItem('${p.id}')" title="削除">✕</button>
          </div>
        `;
      }).filter(Boolean).join('');

      listEl.innerHTML = items || '<div class="empty-msg">カートに商品がありません</div>';
      document.getElementById('total-price').textContent = '¥' + total.toLocaleString();
      footer.style.display = items ? 'block' : 'none';
    }

    function changeQty(id, delta) {
      let cart = getCart();
      const idx = cart.findIndex(x => String(x.id) === String(id));
      if (idx === -1) return;
      cart[idx].qty = (parseInt(cart[idx].qty, 10) || 1) + delta;
      if (cart[idx].qty <= 0) cart.splice(idx, 1);
      saveCart(cart);
      renderCart();
    }

    function removeItem(id) {
      saveCart(getCart().filter(x => String(x.id) !== String(id)));
      renderCart();
    }

    saveCart(getCart());
    renderCart();
  </script>
</body>
</html>
